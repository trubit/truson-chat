<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10C4A0"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="11" fill="#07101C"/>
  <rect width="40" height="40" rx="11" fill="url(#g)" fill-opacity="0.13"/>

  <!-- Vertical arm -->
  <line x1="14" y1="10" x2="14" y2="27" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Horizontal arm -->
  <line x1="14" y1="27" x2="29" y2="27" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top node -->
  <circle cx="14" cy="10" r="4" fill="url(#g)" filter="url(#glow)"/>
  <!-- Corner junction -->
  <circle cx="14" cy="27" r="3" fill="#0891B2" opacity="0.85"/>
  <!-- End node -->
  <circle cx="29" cy="27" r="4" fill="url(#g)" filter="url(#glow)"/>

  <!-- Secondary arc -->
  <path d="M 17 10 Q 29 10 29 23" stroke="#10C4A0" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.35"/>
</svg>
