name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      # mongodb-memory-server downloads its binary to this cache dir
      MONGOMS_DOWNLOAD_DIR: /tmp/mongodb-binaries
      # Required by env.ts validation — set safe test values here
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      MONGODB_URI: mongodb://localhost:27017/truson_chat_test
      MONGODB_DB_NAME: truson_chat_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: test_redis_pass
      REDIS_DB: 1
      JWT_ACCESS_SECRET: test_jwt_access_secret_min_32_chars_ok
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_min_32_chars_ok
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SESSION_SECRET: test_session_secret_min_32_chars_ok_x
      CLOUDINARY_CLOUD_NAME: test_cloud
      CLOUDINARY_API_KEY: test_api_key
      CLOUDINARY_API_SECRET: test_api_secret
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: test@example.com
      SMTP_PASS: test_pass
      SMTP_FROM_NAME: Truson-Chat Test
      SMTP_FROM_EMAIL: noreply@example.com
      LOG_LEVEL: error
      LOG_FILE_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: /tmp/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            mongodb-binaries-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error
