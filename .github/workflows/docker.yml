name: Docker

# Build the production Docker image and push to GitHub Container Registry.
#
# Triggers:
#   push to main     → build + push (tagged :latest and :sha-<short>)
#   push of v*.*.* tag → build + push (tagged with semver versions)
#   pull_request     → build only (validates Dockerfile, no push)
#
# Image: ghcr.io/<owner>/<repo>
# To pull after first push:
#   docker pull ghcr.io/<owner>/linkora:latest

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest on main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # short SHA for traceability (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # semver tags from git tag (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0.') }}
            # branch name on non-main branches (for staging previews)
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
            # PR number for review builds
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=Linkora
            org.opencontainers.image.description=Production real-time communication platform
            org.opencontainers.image.vendor=Linkora

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache for Docker layers — speeds up rebuilds ~60%
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Add linux/arm64 here if deploying to ARM (e.g. Raspberry Pi, Graviton)
          platforms: linux/amd64
          provenance: true
          sbom: true
