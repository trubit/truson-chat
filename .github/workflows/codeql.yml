name: CodeQL Security Analysis

# GitHub CodeQL — static analysis for security vulnerabilities.
#
# Scans JavaScript/TypeScript (covers both the Express backend and React
# frontend).  Results appear in the Security → Code scanning tab.
#
# Runs on:
#   • Every push to main / develop
#   • Every PR targeting main
#   • Weekly schedule (Monday 02:00 UTC) for full-depth scan of main

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: CodeQL Analyze (JavaScript / TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-extended includes OWASP Top 10 + additional security queries
          queries: security-extended
          # Exclude generated files and vendored code from analysis
          config: |
            paths-ignore:
              - dist
              - node_modules
              - coverage
              - playwright-report

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript → JavaScript for deeper server analysis)
        run: npm run server:build
        # Build failure doesn't block the scan — CodeQL can still analyse source
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
          # Upload results to GitHub Security tab
          upload: true
