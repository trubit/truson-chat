name: truson-chat-dev

services:
  mongodb:
    image: mongo:8.0
    container_name: truson_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - ../.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-truson_chat}
    volumes:
      - mongo_data:/data/db
      - ../scripts/db/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: truson_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    env_file:
      - ../.env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1000
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: truson_mail
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
