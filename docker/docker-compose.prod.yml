name: linkora-prod

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: linkora_app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
    expose:
      - '3001'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    healthcheck:
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "require('http').get('http://localhost:3001/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: linkora_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../dist/client:/app/dist/client:ro
      - nginx_logs:/var/log/nginx
      # SSL certificates — mount your certs here before enabling HTTPS in nginx.conf
      - /etc/ssl/linkora:/etc/nginx/ssl:ro
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  mongodb:
    image: mongo:8.0
    container_name: linkora_mongo
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-linkora}
    volumes:
      - mongo_data:/data/db
    expose:
      - '27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: linkora_redis
    restart: unless-stopped
    env_file:
      - ../.env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 300 100
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 15s
      timeout: 3s
      start_period: 15s
      retries: 5

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  nginx_logs:
    driver: local
