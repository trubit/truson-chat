user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    # ── Upstream: Node.js Application ────────────────────────────────────────
    upstream truson_app {
        least_conn;
        server localhost:3001;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (activate once SSL is configured) ──────────────
    # server {
    #     listen 80;
    #     server_name example.com www.example.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # ── SSL (uncomment and adjust when certificates are provisioned) ──────
        # listen 443 ssl http2;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_session_timeout 1d;
        # ssl_session_cache   shared:SSL:50m;
        # ssl_session_tickets off;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        # ssl_prefer_server_ciphers off;
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        root /app/dist/client;
        index index.html;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options            "SAMEORIGIN"            always;
        add_header X-Content-Type-Options     "nosniff"               always;
        add_header X-XSS-Protection           "1; mode=block"         always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

        client_max_body_size 55m;

        # ── Auth endpoints — strict rate limit ───────────────────────────────
        location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://truson_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── General API — standard rate limit ────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://truson_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # ── Health check passthrough ─────────────────────────────────────────
        location /health {
            proxy_pass         http://truson_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            access_log off;
        }

        # ── WebSocket — Socket.IO ────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://truson_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Immutable static assets (JS/CSS with content hash) ───────────────
        location ~* \.(js|css|woff2|woff|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # ── Images & media ───────────────────────────────────────────────────
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|mp4|webm)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # ── SPA fallback — serve index.html for client-side routes ───────────
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header X-Frame-Options        "SAMEORIGIN"            always;
            add_header X-Content-Type-Options "nosniff"               always;
            add_header X-XSS-Protection       "1; mode=block"         always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        }
    }
}
